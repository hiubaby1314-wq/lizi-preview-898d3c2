<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>栗子素材网 - 服务器维护中</title>
<style>
body { font-family: -apple-system, sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#f5f5f5; color:#1f2937; text-align:center; }
.box { max-width:400px; padding:40px 20px; }
.icon { font-size:64px; margin-bottom:20px; }
h1 { font-size:20px; margin-bottom:12px; }
p { color:#6b7280; font-size:14px; line-height:1.6; margin-bottom:20px; }
button { padding:10px 24px; background:#10b981; color:#fff; border:none; border-radius:8px; font-size:15px; cursor:pointer; }
button:hover { background:#059669; }
</style>
</head>
<body>
<div class="box">
<div class="icon">🌰</div>
<h1>服务器正在启动中...</h1>
<p>栗子素材网暂时无法访问，服务器正在自动重启。<br>请稍等片刻后刷新页面。</p>
<button onclick="location.reload()">刷新页面</button>
</div>
<script>setTimeout(function(){ location.reload(); }, 10000);</script>
</body>
</html>
